name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: master
      - run: make check

  build:
    name: Build
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: master
      - name: Debug
        run: make build
      - name: ReleaseSafe
        run: make build-safe

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: master
      - run: make test
      - run: make test-cli
      - name: Result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "All tests passed"
          else
            echo "Tests failed"
          fi
